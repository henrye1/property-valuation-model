name: engine

on:
  push:
    branches: [main]
    paths:
      - "packages/valuation_engine/**"
      - "1. VALUATION EXAMPLES/**"
      - "scripts/generate_golden.py"
      - ".github/workflows/engine.yml"
  pull_request:
    paths:
      - "packages/valuation_engine/**"
      - "1. VALUATION EXAMPLES/**"
      - "scripts/generate_golden.py"
      - ".github/workflows/engine.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install engine
        working-directory: packages/valuation_engine
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Lint
        working-directory: packages/valuation_engine
        run: ruff check src tests
      - name: Type-check
        working-directory: packages/valuation_engine
        run: mypy src
      - name: Tests
        working-directory: packages/valuation_engine
        run: pytest -v
