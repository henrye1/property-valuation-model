[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "valuation-engine"
description = "Property valuation engine (income capitalisation)."
readme = "README.md"
requires-python = ">=3.11"
license = { text = "Proprietary" }
authors = [{ name = "Anchor Point Risk", email = "henry@anchorpointrisk.co.za" }]
dynamic = ["version"]
dependencies = [
    "pydantic>=2.6,<3",
    "openpyxl>=3.1,<4",
]

[project.optional-dependencies]
dev = [
    "pytest>=8",
    "pytest-cov>=5",
    "ruff>=0.5",
    "mypy>=1.10",
    "build>=1.2",
]

[tool.hatch.version]
path = "src/valuation_engine/_version.py"

[tool.hatch.build.targets.wheel]
packages = ["src/valuation_engine"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "W", "I", "B", "UP", "SIM", "RET"]

[tool.mypy]
python_version = "3.11"
strict = true
plugins = ["pydantic.mypy"]
files = ["src/valuation_engine"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
